{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernetes-monitor.fullname" . }}
  labels:
    {{- include "kubernetes-monitor.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - pods
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubernetes-monitor.fullname" . }}
  labels:
    {{- include "kubernetes-monitor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubernetes-monitor.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubernetes-monitor.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
