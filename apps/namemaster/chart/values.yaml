# Default values for namemaster.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  domain: opsbox.org

replicaCount: 1

image:
  repository: daniil3680/namemaster
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest
imagePullSecrets:
  - name: dockerhub-pull-secret

app:
  containerPort: 5000

gunicorn:
  args: "--workers=3 --threads=2 --timeout=60"


# Creates a ServiceAccount for the ability to install and modify resources in namespace: namemaster using gitlab runner.
# The token is written to the secret "namemaster-serviceaccount-secret".

rbac:
  create: false
  serviceaccount:
    name: namemaster-serviceaccount
    annotations: {}
    namesecret: namemaster-serviceaccount-secret

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Keep HPA-created replicas spread across nodes. The scheduler uses resource
# requests, not live CPU usage, so this keeps replicas from concentrating on a
# few nodes during load tests.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway

nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 80

gateway:
  enabled: true
  name: public
  namespace: nginx-gateway
  # Defaults to namemaster.<global.domain>.
  hostname: ""
  tls:
    enabled: true
    redirectHttpToHttps: true
  route:
    enabled: true
    sectionName: namemaster-https
    redirectSectionName: namemaster-http
    paths:
      - path: /
        pathType: PathPrefix

# You need to enter data from your postgresql
# This data will be entered into the secret for working with the namemaster database

postgresql:
  username: namemaster
  password: ""
  existingSecret:
    name: postgresql
    passwordKey: password
  host: postgresql
  port: '5432'
  database: namemaster

namemaster:
  secretKey:
    existingSecret:
      name: ""
      key: namemaster-secretkey

loadTest:
  enabled: false
  token: ""
  existingSecret:
    name: ""
    tokenKey: load-test-token

# Pod limits
resources: 
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 750m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Enable pod autoscaling using HorizontalPodAutoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # Memory utilization is not a useful RPS proxy for this stateless Flask app.
  # Prefer a Prometheus custom metric such as RPS or p95 latency if needed.
  targetMemoryUtilizationPercentage: null
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min

pdb:
  enabled: true
  maxUnavailable: "25%"
  minAvailable: ""

networkPolicy:
  enabled: true

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  startup:
    path: /healthz
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
