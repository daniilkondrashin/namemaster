{{- $secretName := include "namemaster.fullname" . -}}
{{- $postgresPasswordSecretName := default $secretName .Values.postgresql.existingSecret.name -}}
{{- $postgresPasswordSecretKey := default "postgresql-password" .Values.postgresql.existingSecret.passwordKey -}}
{{- $namemasterSecretKeySecretName := default $secretName .Values.namemaster.secretKey.existingSecret.name -}}
{{- $namemasterSecretKeySecretKey := default "namemaster-secretkey" .Values.namemaster.secretKey.existingSecret.key -}}
{{- $loadTestSecretName := default $secretName .Values.loadTest.existingSecret.name -}}
{{- $loadTestTokenKey := default "load-test-token" .Values.loadTest.existingSecret.tokenKey -}}
{{- $probes := .Values.probes | default dict -}}
{{- $startupProbe := $probes.startup | default dict -}}
{{- $livenessProbe := $probes.liveness | default dict -}}
{{- $readinessProbe := $probes.readiness | default dict -}}
{{- $autoscaling := .Values.autoscaling | default dict -}}
{{- $autoscalingEnabled := true -}}
{{- if hasKey $autoscaling "enabled" -}}
{{- $autoscalingEnabled = $autoscaling.enabled -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "namemaster.fullname" . }}
  labels:
    {{- include "namemaster.labels" . | nindent 4 }}
spec:
  {{- if not $autoscalingEnabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "namemaster.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "namemaster.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        -
          {{- toYaml (omit . "labelSelector") | nindent 10 }}
          {{- if hasKey . "labelSelector" }}
          labelSelector:
            {{- toYaml .labelSelector | nindent 12 }}
          {{- else }}
          labelSelector:
            matchLabels:
              {{- include "namemaster.selectorLabels" $ | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.containerPort }}
              protocol: TCP
          env:
            - name: GUNICORN_CMD_ARGS
              value: {{ .Values.gunicorn.args | quote }}
            - name: postgresql-username
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-username
            - name: postgresql-password
              valueFrom:
                secretKeyRef:
                  name: {{ $postgresPasswordSecretName }}
                  key: {{ $postgresPasswordSecretKey }}
            - name: postgresql-host
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-host
            - name: postgresql-port
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-port
            - name: postgresql-database
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-database
            - name: namemaster-secretkey
              valueFrom:
                secretKeyRef:
                  name: {{ $namemasterSecretKeySecretName }}
                  key: {{ $namemasterSecretKeySecretKey }}
            {{- if .Values.loadTest.enabled }}
            - name: LOAD_TEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $loadTestSecretName }}
                  key: {{ $loadTestTokenKey }}
            {{- end }}
          startupProbe:
            httpGet:
              path: {{ default "/healthz" $startupProbe.path | quote }}
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: {{ default 0 $startupProbe.initialDelaySeconds }}
            periodSeconds: {{ default 5 $startupProbe.periodSeconds }}
            timeoutSeconds: {{ default 3 $startupProbe.timeoutSeconds }}
            failureThreshold: {{ default 30 $startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ default "/healthz" $livenessProbe.path | quote }}
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: {{ default 10 $livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 10 $livenessProbe.periodSeconds }}
            timeoutSeconds: {{ default 3 $livenessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 $livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ default "/healthz" $readinessProbe.path | quote }}
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: {{ default 3 $readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 5 $readinessProbe.periodSeconds }}
            timeoutSeconds: {{ default 2 $readinessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 $readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
