{{- $secretName := include "namemaster.fullname" . -}}
{{- $postgresPasswordSecretName := default $secretName .Values.postgresql.existingSecret.name -}}
{{- $postgresPasswordSecretKey := default "postgresql-password" .Values.postgresql.existingSecret.passwordKey -}}
{{- $namemasterSecretKeySecretName := default $secretName .Values.namemaster.secretKey.existingSecret.name -}}
{{- $namemasterSecretKeySecretKey := default "namemaster-secretkey" .Values.namemaster.secretKey.existingSecret.key -}}
{{- $loadTestSecretName := default $secretName .Values.loadTest.existingSecret.name -}}
{{- $loadTestTokenKey := default "load-test-token" .Values.loadTest.existingSecret.tokenKey -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "namemaster.fullname" . }}
  labels:
    {{- include "namemaster.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "namemaster.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "namemaster.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        -
          {{- toYaml (omit . "labelSelector") | nindent 10 }}
          {{- if hasKey . "labelSelector" }}
          labelSelector:
            {{- toYaml .labelSelector | nindent 12 }}
          {{- else }}
          labelSelector:
            matchLabels:
              {{- include "namemaster.selectorLabels" $ | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.containerPort }}
              protocol: TCP
          env:
            - name: GUNICORN_CMD_ARGS
              value: {{ .Values.gunicorn.args | quote }}
            - name: postgresql-username
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-username
            - name: postgresql-password
              valueFrom:
                secretKeyRef:
                  name: {{ $postgresPasswordSecretName }}
                  key: {{ $postgresPasswordSecretKey }}
            - name: postgresql-host
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-host
            - name: postgresql-port
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-port
            - name: postgresql-database
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: postgresql-database
            - name: namemaster-secretkey
              valueFrom:
                secretKeyRef:
                  name: {{ $namemasterSecretKeySecretName }}
                  key: {{ $namemasterSecretKeySecretKey }}
            {{- if .Values.loadTest.enabled }}
            - name: LOAD_TEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $loadTestSecretName }}
                  key: {{ $loadTestTokenKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path | quote }}
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | quote }}
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
