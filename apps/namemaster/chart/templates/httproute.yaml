{{- if and .Values.gateway.enabled .Values.gateway.route.enabled -}}
{{- $fullName := include "namemaster.fullname" . -}}
{{- $gatewayName := default $fullName .Values.gateway.name -}}
{{- $sectionName := .Values.gateway.route.sectionName -}}
{{- if not $sectionName -}}
{{- if .Values.gateway.tls.enabled -}}
{{- $sectionName = "https" -}}
{{- else -}}
{{- $sectionName = "http" -}}
{{- end -}}
{{- end -}}
{{- $redirectSectionName := default "http" .Values.gateway.route.redirectSectionName -}}
{{- $hostname := include "namemaster.hostname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "namemaster.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      {{- with .Values.gateway.namespace }}
      namespace: {{ . | quote }}
      {{- end }}
      sectionName: {{ $sectionName | quote }}
  hostnames:
    - {{ $hostname | quote }}
  rules:
    - matches:
        {{- range .Values.gateway.route.paths }}
        - path:
            type: {{ default "PathPrefix" .pathType }}
            value: {{ default "/" .path | quote }}
        {{- end }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.service.port }}
{{- if and .Values.gateway.tls.enabled .Values.gateway.tls.redirectHttpToHttps }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-redirect
  labels:
    {{- include "namemaster.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      {{- with .Values.gateway.namespace }}
      namespace: {{ . | quote }}
      {{- end }}
      sectionName: {{ $redirectSectionName | quote }}
  hostnames:
    - {{ $hostname | quote }}
  rules:
    - matches:
        {{- range .Values.gateway.route.paths }}
        - path:
            type: {{ default "PathPrefix" .pathType }}
            value: {{ default "/" .path | quote }}
        {{- end }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301
{{- end }}
{{- end }}
