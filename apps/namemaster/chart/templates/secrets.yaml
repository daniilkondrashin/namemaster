{{- $secretName := include "namemaster.fullname" . -}}
{{- $namemasterSecretKey := .Values.namemaster.secretKey.existingSecret.key | default "namemaster-secretkey" -}}
{{- $existingAppSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingNamemasterSecretKey := "" -}}
{{- if $existingAppSecret -}}
{{- $existingNamemasterSecretKey = index $existingAppSecret.data $namemasterSecretKey | default "" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: {{ include "namemaster.name" . }}
    helm.sh/chart: {{ include "namemaster.chart" . }}
type: Opaque
data:
  postgresql-username: {{ .Values.postgresql.username | b64enc | quote }}
  {{- if .Values.postgresql.password }}
  postgresql-password: {{ .Values.postgresql.password | b64enc | quote }}
  {{- end }}
  postgresql-host: {{ .Values.postgresql.host | b64enc | quote }}
  postgresql-port: {{ .Values.postgresql.port | b64enc | quote }}
  postgresql-database: {{ .Values.postgresql.database | b64enc | quote }}
  {{- if not .Values.namemaster.secretKey.existingSecret.name }}
  {{ $namemasterSecretKey }}: {{ $existingNamemasterSecretKey | default (randAlphaNum 64 | b64enc) | quote }}
  {{- end }}
  {{- if and .Values.loadTest.enabled (not .Values.loadTest.existingSecret.name) }}
  load-test-token: {{ required "loadTest.token is required when loadTest.enabled=true and loadTest.existingSecret.name is empty" .Values.loadTest.token | b64enc | quote }}
  {{- end }}
