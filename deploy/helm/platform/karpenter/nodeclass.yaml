apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: "${KARPENTER_NODE_ROLE_NAME}"
  amiSelectorTerms:
    - alias: "${KARPENTER_AMI_ALIAS}"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  tags:
    Project: namemaster
    Terraform: "true"
