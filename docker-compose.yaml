services:
  web:
    build:
      context: ./apps/namemaster
    image: daniil3680/namemaster
    volumes:
      - ./apps/namemaster/src:/app
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      postgresql-username: postgres
      postgresql-password: password
      postgresql-host: db
      postgresql-port: 5432
      postgresql-database: mydatabase
      namemaster-secretkey: dev-only-secret-key

  db:
    image: postgres:12
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
