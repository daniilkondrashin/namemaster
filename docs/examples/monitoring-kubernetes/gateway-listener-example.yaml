# Example fragment for the shared Gateway. Do not apply this file as a full Gateway.
listeners:
  - name: monitoring-https
    hostname: monitoring.opsbox.org
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
        - kind: Secret
          name: monitoring-opsbox-org-tls
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring
