apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-monitor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kubernetes-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-monitor
    spec:
      serviceAccountName: kubernetes-monitor
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: dockerhub-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubernetes-monitor
          image: daniil3680/monitoring:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: METRICS_POLL_INTERVAL
              value: "5"
            - name: MONITORED_POD_SELECTOR
              value: "app.kubernetes.io/name=namemaster"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
